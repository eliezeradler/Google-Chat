name: Run Chat Copier Sync

on:
  workflow_dispatch: # מאפשר הרצה ידנית או דרך API/Cron חיצוני

concurrency:
  group: chat-copier-sync
  cancel-in-progress: false # ריצות חדשות ימתינו בתור ולא ידרסו ריצה פעילה

jobs:
  sync-messages:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # מוארך קצת למקרה של עשרות הודעות
    permissions:
      contents: write # חובה כדי לשמור את קובץ הזיכרון
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Run Sync Script
        env:
          GCP_TOKEN: ${{ secrets.GCP_TOKEN }}
        run: python main.py

      - name: Save Memory File (Commit)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add sync_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state and thread mapping" && git push)
